version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # Majors that break our Node 18/20 floor or fail CI today
      - dependency-name: "commander"
        update-types: ["version-update:semver-major"]
      - dependency-name: "js-yaml"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
