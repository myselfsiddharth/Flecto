# Auto-label PRs by touched paths
docs:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "docs/**"
          - "**/*.md"
ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
core:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**"
          - "index.js"
tests:
  - changed-files:
      - any-glob-to-any-file:
          - "test/**"
policies:
  - changed-files:
      - any-glob-to-any-file:
          - "src/packs/**"
          - "src/policy.js"
          - "schemas/**"
