name: Feature request
description: Propose an improvement for Flecto
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Flecto do?
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: Suggested milestone
      options:
        - Unsure
        - v2.1
        - v2.2
        - Later / discuss
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
